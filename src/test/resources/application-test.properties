# 测试环境配置
env=TEST

# H2 内存数据库配置（用于测试 MySQL 依赖的功能）
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Neo4j 测试配置（使用嵌入式或测试实例）
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=test_password

# 禁用不需要的外部服务（使用 MockBean 替代）
# HBase
hbase.zookeeper.quorum=localhost
hbase.zookeeper.property.clientPort=2181

# Kafka 测试配置
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=test-group
spring.kafka.consumer.auto-offset-reset=earliest

# RocketMQ 测试配置
rocketmq.name-server=localhost:9876
rocketmq.producer.group=test-producer-group

# 日志配置
logging.level.io.deepcover.datacenter=DEBUG
logging.level.org.springframework.test=DEBUG

# 测试超时配置
spring.test.timeout=30s
