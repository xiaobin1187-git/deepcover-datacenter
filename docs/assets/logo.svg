<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d4a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#1a73e8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#448aff;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="64" cy="64" r="28" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.7"/>
  <!-- Crosshair horizontal -->
  <line x1="16" y1="64" x2="112" y2="64" stroke="#00bcd4" stroke-width="0.8" opacity="0.25"/>
  <!-- Crosshair vertical -->
  <line x1="64" y1="16" x2="64" y2="112" stroke="#00bcd4" stroke-width="0.8" opacity="0.25"/>
  <!-- Radar sweep arc -->
  <path d="M 64 64 L 64 12 A 52 52 0 0 1 109 40 Z" fill="url(#glow)" opacity="0.15" filter="url(#blur)"/>
  <!-- Scan line -->
  <line x1="64" y1="64" x2="109" y2="40" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
  <!-- Target dot -->
  <circle cx="64" cy="64" r="4" fill="#00e5ff"/>
  <circle cx="64" cy="64" r="7" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <!-- DC text -->
  <text x="64" y="69" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="14" fill="#ffffff" letter-spacing="2">DC</text>
  <!-- Small data points -->
  <circle cx="78" cy="38" r="2" fill="#00bcd4" opacity="0.8"/>
  <circle cx="88" cy="52" r="1.5" fill="#1a73e8" opacity="0.7"/>
  <circle cx="72" cy="30" r="1.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="95" cy="48" r="1" fill="#00bcd4" opacity="0.5"/>
  <circle cx="50" cy="88" r="1.5" fill="#1a73e8" opacity="0.6"/>
  <circle cx="42" cy="78" r="1" fill="#00bcd4" opacity="0.5"/>
</svg>
